      - Kubernetes for ML: chapters/infrastructure/kubernetes-for-ml.md
      - GPU Scheduling & Resources: chapters/infrastructure/gpu-scheduling.md
      - Infrastructure as Code: chapters/infrastructure/infrastructure-as-code.md
      - Orchestration Patterns: chapters/infrastructure/orchestration-patterns.md
      - Multi-Cloud Strategies: chapters/infrastructure/multi-cloud.md
      - "Hands-on: GPU Platform on GKE": chapters/infrastructure/hands-on-gke-platform.md
