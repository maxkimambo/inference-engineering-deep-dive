      - Neural Networks: chapters/models/neural-networks.md
      - LLM Inference Mechanics: chapters/models/llm-inference-mechanics.md
      - Image & Video Generation: chapters/models/image-video-generation.md
      - Calculating Bottlenecks: chapters/models/bottlenecks.md
  - "3 · Hardware":
      - chapters/hardware/index.md
      - Anatomy of a GPU: chapters/hardware/gpu-anatomy.md
      - The Memory Hierarchy: chapters/hardware/memory-hierarchy.md
      - Compute & Precision: chapters/hardware/compute-and-precision.md
      - Interconnect: chapters/hardware/interconnect.md
      - Choosing a GPU: chapters/hardware/choosing-a-gpu.md
  - "4 · Software":
      - chapters/software/index.md
  - "5 · Techniques":
      - chapters/techniques/index.md
      - Quantization: chapters/techniques/quantization.md
      - Speculative Decoding: chapters/techniques/speculative-decoding.md
      - Caching: chapters/techniques/caching.md
      - Parallelism: chapters/techniques/parallelism.md
      - Disaggregation: chapters/techniques/disaggregation.md
  - "6 · Modalities":
      - chapters/modalities/index.md
  - "7 · Production":
      - chapters/production/index.md
      - Containerization: chapters/production/containerization.md
      - Autoscaling: chapters/production/autoscaling.md
      - Multi-Cloud Capacity: chapters/production/multi-cloud-capacity.md
      - Testing & Deployment: chapters/production/testing-and-deployment.md
      - Client Code: chapters/production/client-code.md
      - Putting It Together (worked example): chapters/production/worked-example.md
      - Hands-on - Quantization Pipeline on GKE: chapters/production/quantization-pipeline-gke.md
  - "8 · Infrastructure":
